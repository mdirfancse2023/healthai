name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-production
  cancel-in-progress: true

env:
  AZURE_RESOURCE_GROUP: myportfolio-rg
  ACR_NAME: myportfolioregistry
  ACR_LOGIN_SERVER: myportfolioregistry.azurecr.io
  AI_APP_NAME: ai-mental-health
  PORTFOLIO_APP_NAME: myportfolio
  AI_IMAGE: myportfolioregistry.azurecr.io/ai-mental-health
  PORTFOLIO_IMAGE: myportfolioregistry.azurecr.io/myportfolio
  NODE_VERSION: "20"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      portfolio_proxy: ${{ steps.filter.outputs.portfolio_proxy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            portfolio_proxy:
              - 'docker/Caddyfile.myportfolio'
              - 'docker/Dockerfile.myportfolio'

  deploy-ai-mental-health:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Angular frontend
        run: |
          cd frontend
          npm ci
          npm run build -- --configuration=production

      - name: Copy frontend into backend static directory
        run: |
          mkdir -p backend/static
          rm -rf backend/static/*
          cp -r frontend/dist/frontend/browser/* backend/static/

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push AI Mental Health image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.AI_IMAGE }}:latest
            ${{ env.AI_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy AI Mental Health Container App
        run: |
          az containerapp update \
            --name "${{ env.AI_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.AI_IMAGE }}:${{ github.sha }}" \
            --set-env-vars \
              APP_BASE_PATH=/aimentalhealth \
              OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              AUTH_SECRET_KEY="${{ secrets.AUTH_SECRET_KEY }}"

      - name: Print deployment URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ env.AI_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)
          echo "Container App URL: https://${FQDN}"
          echo "Public site URL: https://virtualgyans.tech/aimentalhealth/"

  deploy-portfolio-proxy:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.portfolio_proxy == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push portfolio proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.myportfolio
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.PORTFOLIO_IMAGE }}:aimentalhealth-proxy
            ${{ env.PORTFOLIO_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy portfolio Container App
        run: |
          az containerapp update \
            --name "${{ env.PORTFOLIO_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.PORTFOLIO_IMAGE }}:aimentalhealth-proxy"
